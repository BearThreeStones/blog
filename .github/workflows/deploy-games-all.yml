name: Deploy Games (3 batches)

on:
  workflow_dispatch:

jobs:
  games-batch-1:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 43.138.57.136 >> ~/.ssh/known_hosts
      - run: sh ./deploy-games.sh 1
        env:
          DEPLOY_HOST: 43.138.57.136
          DEPLOY_USER: ubuntu
          DEPLOY_PATH: /home/www/website

  games-batch-2:
    needs: games-batch-1
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 43.138.57.136 >> ~/.ssh/known_hosts
      - run: sh ./deploy-games.sh 2
        env:
          DEPLOY_HOST: 43.138.57.136
          DEPLOY_USER: ubuntu
          DEPLOY_PATH: /home/www/website

  games-batch-3:
    needs: games-batch-2
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 43.138.57.136 >> ~/.ssh/known_hosts
      - run: sh ./deploy-games.sh 3
        env:
          DEPLOY_HOST: 43.138.57.136
          DEPLOY_USER: ubuntu
          DEPLOY_PATH: /home/www/website
