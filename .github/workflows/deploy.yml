name: Deploy Blog

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Show SSH key fingerprints
        run: ssh-add -l -E sha256

      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 43.138.57.136 >> ~/.ssh/known_hosts

      - name: Deploy site
        run: sh ./deploy.sh
        env:
          SERVER_REPO: git@43.138.57.136:/srv/git/blog.git