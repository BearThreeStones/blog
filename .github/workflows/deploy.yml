name: Deploy Blog

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deployment host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 43.138.57.136 >> ~/.ssh/known_hosts

      - name: Deploy site
        run: sh ./deploy.sh
        env:
          DEPLOY_HOST: 43.138.57.136
          DEPLOY_USER: ubuntu
          DEPLOY_PATH: /home/www/website
          DOCSEARCH_APP_ID: ${{ secrets.DOCSEARCH_APP_ID }}
          DOCSEARCH_API_KEY: ${{ secrets.DOCSEARCH_API_KEY }}
          DOCSEARCH_INDEX_NAME: ${{ secrets.DOCSEARCH_INDEX_NAME }}
          GOOGLE_ANALYTICS_ID: ${{ secrets.GOOGLE_ANALYTICS_ID }}
          BAIDU_ANALYTICS_ID: ${{ secrets.BAIDU_ANALYTICS_ID }}